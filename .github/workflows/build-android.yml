name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    - name: Sync web resources to Android
      run: npx cap sync android
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Make gradlew executable
      run: chmod +x ./android/gradlew

    - name: Create keystore file
      run: |
        cd android
        # Remove existing keystore file to ensure a fresh creation
        if [ -f "my-release-key.keystore" ]; then
          echo "Removing existing keystore file"
          rm -f my-release-key.keystore
        fi
        # Create new keystore file
        echo "Creating keystore file"
        keytool -genkey -v -keystore my-release-key.keystore -alias yuexuxingzuo -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=yuexuxingzuo, OU=yuexuxingzuo, O=yuexuxingzuo, L=Beijing, ST=Beijing, C=CN"
        # List aliases in keystore
        echo "=== Listing aliases in keystore ==="
        keytool -list -keystore my-release-key.keystore -storepass 123456
        # Check keystore file details
        echo "=== Keystore file details ==="
        ls -la my-release-key.keystore
        file my-release-key.keystore

    - name: Extract SHA1 from keystore
      run: |
        cd android
        echo "Run # 将 base64 编码的 keystore 还原为文件"
        echo ""
        echo "===== SHA1 指纹（小米应用商店用）====="
        # Extract SHA1 fingerprint with colons
        sha1_with_colons=$(keytool -list -v -keystore my-release-key.keystore -alias yuexuxingzuo -storepass 123456 | grep -A 1 "SHA1:" | tail -1 | sed 's/^[[:space:]]*//')
        echo "$sha1_with_colons"
        echo "======================================="
        echo ""
        echo "===== 去掉冒号的 SHA1（直接复制）====="
        # Remove colons from SHA1
        sha1_without_colons=$(echo "$sha1_with_colons" | tr -d ":")
        echo "$sha1_without_colons"
        echo "======================================="

    - name: Build Android Release APK
      run: |
        cd android
        echo "=== Building Release APK ==="
        # 清理之前的构建产物
        ./gradlew clean
        # 构建release APK
        echo "Building release APK"
        ./gradlew assembleRelease --no-build-cache --no-daemon
        echo "=== Build completed, checking output ==="
        ls -la app/build/outputs/apk/release/
        file app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK file not found"
        stat -c '%s' app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "Cannot get APK file size"
        # 验证APK文件的完整性
        echo "=== Verifying APK file ==="
        unzip -t app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK file verification failed"
        # 检查APK签名
        echo "=== Checking APK signature ==="
        if command -v apksigner &> /dev/null; then
          apksigner verify --verbose app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "Cannot verify APK signature"
        else
          echo "apksigner not found, skipping signature verification"
        fi
        # 查看APK基本信息
        echo "=== Checking APK basic info ==="
        if command -v aapt &> /dev/null; then
          aapt dump badging app/build/outputs/apk/release/app-release.apk | grep -E "package|sdkVersion" 2>/dev/null || echo "Cannot get APK info"
        else
          echo "aapt not found, skipping APK info check"
        fi

    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30