name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    - name: Sync web resources to Android
      run: npx cap sync android
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Check and prepare keystore
      run: |
        echo "=== Checking GitHub Secrets ==="
        if [ -n "${{ secrets.KEYSTORE_FILE }}" ]; then
          echo "GitHub Secrets KEYSTORE_FILE is set (length: ${#KEYSTORE_FILE})"
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/my-release-key.keystore
        else
          echo "GitHub Secrets KEYSTORE_FILE is not set, using local keystore file"
        fi
        echo "=== Checking keystore file ==="
        ls -la android/my-release-key.keystore
        file android/my-release-key.keystore
        echo "=== Listing all aliases in keystore ==="
        keytool -list -keystore android/my-release-key.keystore -storepass 123456 2>&1
        echo "=== Checking for specific alias 'yuexuxingzuo' ==="
        keytool -list -keystore android/my-release-key.keystore -storepass 123456 | grep "yuexuxingzuo" 2>&1 || echo "Alias 'yuexuxingzuo' not found"
    
    - name: Extract fingerprints from keystore
      run: |
        echo "# 将 base64 编码的 keystore 还原为文件"
        echo ""
        if [ -f "android/my-release-key.keystore" ]; then
          echo "===== 证书指纹 ====="
          keytool -list -v -keystore android/my-release-key.keystore -alias yuexuxingzuo -storepass 123456 2>/dev/null | grep -E "(MD5|SHA1|SHA256):" || true
          echo "===================="
          echo ""
          echo "===== MD5 指纹 ====="
          keytool -list -v -keystore android/my-release-key.keystore -alias yuexuxingzuo -storepass 123456 2>/dev/null | grep "MD5:" | sed 's/.*MD5: //' || true
          echo "===================="
          echo ""
          echo "===== SHA1 指纹（小米应用商店用）====="
          keytool -list -v -keystore android/my-release-key.keystore -alias yuexuxingzuo -storepass 123456 2>/dev/null | grep "SHA1:" | sed 's/.*SHA1: //' || true
          echo "======================================"
          echo ""
          echo "===== 去掉冒号的 SHA1（直接复制）====="
          keytool -list -v -keystore android/my-release-key.keystore -alias yuexuxingzuo -storepass 123456 2>/dev/null | grep "SHA1:" | sed 's/.*SHA1: //' | tr -d ':' || true
          echo "======================================"
          echo ""
          echo "===== 公钥信息 ====="
          keytool -list -v -keystore android/my-release-key.keystore -alias yuexuxingzuo -storepass 123456 2>/dev/null | grep -A 3 "Certificate fingerprints:" || true
          echo "============================="
        else
          echo "警告：keystore 文件不存在，跳过指纹提取"
        fi
        echo "指纹提取步骤完成（即使出现错误也会继续构建）"
    
    - name: Make gradlew executable
      run: chmod +x ./android/gradlew
    
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Build Android Release APK
      run: |
        cd android
        if [ -s my-release-key.keystore ]; then
          echo "Using existing keystore file for signing"
          # Check if the alias exists in the keystore with error handling
          ALIAS_EXISTS=$(keytool -list -keystore my-release-key.keystore -storepass 123456 2>/dev/null | grep -c "yuexuxingzuo")
          if [ $? -eq 0 ] && [ $ALIAS_EXISTS -gt 0 ]; then
            echo "Alias 'yuexuxingzuo' found in keystore, building signed release APK"
            ./gradlew assembleRelease --no-build-cache
          else
            echo "Alias 'yuexuxingzuo' not found in keystore or keytool failed, building unsigned release APK"
            ./gradlew assembleRelease --no-build-cache -Pandroid.injected.signing.store.file=/dev/null
          fi
        else
          echo "Keystore file is empty or missing, building unsigned release APK"
          ./gradlew assembleRelease --no-build-cache -Pandroid.injected.signing.store.file=/dev/null
        fi
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30