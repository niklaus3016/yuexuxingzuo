name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    - name: Sync web resources to Android
      run: npx cap sync android
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Make gradlew executable
      run: chmod +x ./android/gradlew

    - name: Create keystore file from GitHub Secrets
      run: |
        cd android
        # Check if KEYSTORE_BASE64 secret is set
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Error: KEYSTORE_BASE64 secret is not set"
          exit 1
        fi
        # Remove existing keystore file if it exists
        if [ -f "app/my-release-key.keystore" ]; then
          echo "Removing existing keystore file"
          rm -f app/my-release-key.keystore
        fi
        # Create keystore file from base64 encoded secret
        echo "Creating keystore file from GitHub Secrets"
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/my-release-key.keystore
        # List aliases in keystore
        echo "=== Listing aliases in keystore ==="
        keytool -list -keystore app/my-release-key.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}"
        # Check keystore file details
        echo "=== Keystore file details ==="
        ls -la app/my-release-key.keystore
        file app/my-release-key.keystore

    - name: Extract SHA1 from keystore
      run: |
        cd android
        echo "Run # 将 base64 编码的 keystore 还原为文件"
        echo ""
        # Get full keytool output for debugging
        full_output=$(keytool -list -v -keystore app/my-release-key.keystore -alias yuexuxingzuo -storepass "${{ secrets.KEYSTORE_PASSWORD }}")
        
        echo "===== MD5 指纹（证书MD5）====="
        # Extract MD5 fingerprint with colons using more reliable method
        md5_with_colons=$(echo "$full_output" | grep -i "md5:" | head -1 | sed 's/.*md5:\s*//i' | sed 's/\s*$//')
        if [ -z "$md5_with_colons" ]; then
          md5_with_colons=$(echo "$full_output" | grep -i "md5" | head -1 | sed 's/.*://' | sed 's/\s*$//')
        fi
        echo "$md5_with_colons"
        echo "======================================="
        echo ""
        echo "===== 去掉冒号的 MD5（直接复制）====="
        # Remove colons from MD5
        md5_without_colons=$(echo "$md5_with_colons" | tr -d ":")
        echo "$md5_without_colons"
        echo "======================================="
        echo ""
        echo "===== SHA1 指纹（小米应用商店用）====="
        # Extract SHA1 fingerprint with colons
        sha1_with_colons=$(echo "$full_output" | grep -i "sha1:" | head -1 | sed 's/.*sha1:\s*//i' | sed 's/\s*$//')
        echo "$sha1_with_colons"
        echo "======================================="
        echo ""
        echo "===== 去掉冒号的 SHA1（直接复制）====="
        # Remove colons from SHA1
        sha1_without_colons=$(echo "$sha1_with_colons" | tr -d ":")
        echo "$sha1_without_colons"
        echo "======================================="
        echo ""
        echo "===== 公钥信息 ===="
        # Show public key information
        echo "$full_output" | grep -A 10 "Subject Public Key Algorithm"
        echo ""
        echo "=== Debug: Full keytool output ==="
        echo "$full_output"

    - name: Build Android Release APK
      run: |
        cd android
        echo "=== Building Release APK ==="
        # 清理之前的构建产物
        ./gradlew clean
        # 构建release APK
        echo "Building release APK"
        ./gradlew assembleRelease --no-build-cache --no-daemon -Pandroid.injected.signing.store.file=app/my-release-key.keystore -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" -Pandroid.injected.signing.key.alias=yuexuxingzuo -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"
        echo "=== Build completed, checking output ==="
        ls -la app/build/outputs/apk/release/
        file app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK file not found"
        stat -c '%s' app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "Cannot get APK file size"
        # 验证APK文件的完整性
        echo "=== Verifying APK file ==="
        unzip -t app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK file verification failed"
        # 检查APK签名
        echo "=== Checking APK signature ==="
        if command -v apksigner &> /dev/null; then
          apksigner verify --verbose app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "Cannot verify APK signature"
        else
          echo "apksigner not found, skipping signature verification"
        fi
        # 查看APK基本信息
        echo "=== Checking APK basic info ==="
        if command -v aapt &> /dev/null; then
          aapt dump badging app/build/outputs/apk/release/app-release.apk | grep -E "package|sdkVersion" 2>/dev/null || echo "Cannot get APK info"
        else
          echo "aapt not found, skipping APK info check"
        fi

    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30