name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web app
      run: npm run build
    
    - name: Sync web resources to Android
      run: npx cap sync android
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'adopt'
        java-version: '21'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Make gradlew executable
      run: chmod +x ./android/gradlew

    - name: Build Android Release APK
      run: |
        cd android
        echo "=== Building Release APK ==="
        # 清理之前的构建产物
        ./gradlew clean
        # 构建unsigned release APK，避免签名相关的问题
        echo "Building unsigned release APK to avoid signing issues"
        ./gradlew assembleRelease --no-build-cache --no-daemon -Pandroid.injected.signing.store.file=/dev/null
        echo "=== Build completed, checking output ==="
        ls -la app/build/outputs/apk/release/
        file app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK file not found"
        stat -c '%s' app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "Cannot get APK file size"
        # 验证APK文件的完整性
        echo "=== Verifying APK file ==="
        unzip -t app/build/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK file verification failed"

    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30